services:
  donilla_backend:
    container_name: donilla-backend
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - donilla_net

networks:
  donilla_net:
    external: true
