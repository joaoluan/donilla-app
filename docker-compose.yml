services:
  donilla_backend:
    container_name: donilla-backend
    build:
      context: .
    restart: unless-stopped
    environment:
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL is required}
      APP_URL: ${APP_URL:-}
      ASAAS_ACCESS_TOKEN: ${ASAAS_ACCESS_TOKEN:-}
      ASAAS_API_BASE_URL: ${ASAAS_API_BASE_URL:-}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_APP_BASE_URL: ${ASAAS_APP_BASE_URL:-}
      ASAAS_CHECKOUT_MINUTES_TO_EXPIRE: ${ASAAS_CHECKOUT_MINUTES_TO_EXPIRE:-60}
      ASAAS_ENVIRONMENT: ${ASAAS_ENVIRONMENT:?ASAAS_ENVIRONMENT is required}
      ASAAS_USER_AGENT: ${ASAAS_USER_AGENT:-}
      ASAAS_WEBHOOK_AUTH_TOKEN: ${ASAAS_WEBHOOK_AUTH_TOKEN:-}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD:?AUTH_ADMIN_PASSWORD is required}
      AUTH_ADMIN_USER: ${AUTH_ADMIN_USER:?AUTH_ADMIN_USER is required}
      AUTH_APP_PASSWORD: ${AUTH_APP_PASSWORD:?AUTH_APP_PASSWORD is required}
      AUTH_APP_USER: ${AUTH_APP_USER:?AUTH_APP_USER is required}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?AUTH_PASSWORD is required}
      AUTH_USER: ${AUTH_USER:?AUTH_USER is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-}
      CORS_EXPOSE_HEADERS: ${CORS_EXPOSE_HEADERS:-}
      CORS_MAX_AGE_SECONDS: ${CORS_MAX_AGE_SECONDS:-}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DEBUG_WHATSAPP_BOT: ${DEBUG_WHATSAPP_BOT:?DEBUG_WHATSAPP_BOT is required}
      HOST: ${HOST:?HOST is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:?JWT_EXPIRES_IN is required}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:?JWT_REFRESH_EXPIRES_IN is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: ${PORT:?PORT is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      WPP_SECRET_KEY: ${WPP_SECRET_KEY:?WPP_SECRET_KEY is required}
      WPP_SERVER_URL: ${WPP_SERVER_URL:?WPP_SERVER_URL is required}
      WPP_SESSION_NAME: ${WPP_SESSION_NAME:?WPP_SESSION_NAME is required}
      WPP_WEBHOOK_TOKEN: ${WPP_WEBHOOK_TOKEN:?WPP_WEBHOOK_TOKEN is required}
    ports:
      - "127.0.0.1:3000:3000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - donilla_net

networks:
  donilla_net:
    external: true
